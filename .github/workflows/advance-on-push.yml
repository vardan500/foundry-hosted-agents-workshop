name: Advance workshop on push to main

on:
  push:

permissions:
  contents: write

concurrency:
  # Shared with init-workshop.yml and start-workshop.yml so all three workflows
  # serialize on the same branch and never race on git push or on the workshop
  # state file. Queue (don't cancel) — the tip gate below makes the latest push
  # win, so cancelling in-flight runs is unnecessary and could drop the one run
  # that would advance.
  group: workshop-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  advance:
    # Only auto-advance on pushes to the default branch of a real workshop
    # instance. Skip:
    #   - template repositories (Azure-Samples/foundry-hosted-agents-workshop and forks
    #     still marked as templates) so pushes there never rewrite the source;
    #   - non-branch refs (a tag named like the default branch must not trigger);
    #   - non-default branches (work happens on main);
    #   - the bot's own commits. Pushes made with GITHUB_TOKEN don't retrigger
    #     workflows, so this is belt-and-suspenders against any future PAT push.
    if: >-
      github.event.repository.is_template == false &&
      github.ref_type == 'branch' &&
      github.ref_name == github.event.repository.default_branch &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to advance
        id: guard
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # 1) Tip gate: only the push that is currently the branch tip advances.
          #    A burst of rapid pushes therefore yields exactly one advance (the
          #    latest), and a stale queued event never triggers a non-fast-forward
          #    push. Sequential "one push per finished step" still advances each
          #    time because each push is the tip when its run executes.
          git fetch --quiet origin "$GITHUB_REF_NAME"
          remote_sha="$(git rev-parse "origin/$GITHUB_REF_NAME")"
          if [[ "$remote_sha" != "$GITHUB_SHA" ]]; then
            echo "A newer push already landed on $GITHUB_REF_NAME; skipping this stale event ($GITHUB_SHA)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git reset --hard "$remote_sha"

          # 2) Sync sentinel guard: a template-sync push (see
          #    .github/workflows/sync-template.yml and
          #    .workshop/scripts/sync_template.py) refreshes .workshop/ and
          #    .github/ from upstream and must NOT advance the step. Those commits
          #    carry a literal "[skip-advance]" marker in their message. Check
          #    EVERY commit in the push (not just the tip), so a sync commit that
          #    is not the tip — e.g. a manual push that bundles another commit
          #    after it — still suppresses the advance. The checks are additive,
          #    not mutually exclusive: start with the event payload (robust for
          #    force-push), but because that payload caps .commits[] at 20 entries,
          #    fall back to the full pushed range and finally the tip whenever the
          #    marker has not been found yet. Match as a fixed string so the
          #    brackets can't act as a regex character class. Keep the marker in
          #    sync with SKIP_ADVANCE_SENTINEL.
          SENTINEL="[skip-advance]"
          sentinel_found=false
          if [[ -f "$GITHUB_EVENT_PATH" ]] && command -v jq >/dev/null 2>&1; then
            if jq -e --arg s "$SENTINEL" '[ (.commits[]?, (.head_commit // empty)) | .message // empty | select(contains($s)) ] | length > 0' "$GITHUB_EVENT_PATH" >/dev/null; then
              sentinel_found=true
            fi
          fi
          if [[ "$sentinel_found" != "true" ]] \
            && [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]] \
            && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            if git log --format=%B "${BEFORE_SHA}..${GITHUB_SHA}" | grep -qF -- "$SENTINEL"; then
              sentinel_found=true
            fi
          fi
          if [[ "$sentinel_found" != "true" ]] \
            && git log -1 --pretty=%B "$GITHUB_SHA" | grep -qF -- "$SENTINEL"; then
            sentinel_found=true
          fi

          if [[ "$sentinel_found" == "true" ]]; then
            echo "A commit in this push carries [skip-advance] (template sync); not advancing."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3) State-file guard: if this push already carried a change to
          #    .workshop_instance/.workshop-state.json, it was an advance/reset/init
          #    commit (the bot's own, or a local `make advance`). Advancing again
          #    would double-step, so skip. Prefer the event payload file lists
          #    (robust for force-push, where BEFORE_SHA may be unreachable); fall
          #    back to git diff. Match the path as a fixed string (not a regex) so
          #    the dots in the path can't act as wildcards.
          STATE_PATH=".workshop_instance/.workshop-state.json"
          changed_state=false
          if [[ -f "$GITHUB_EVENT_PATH" ]] && command -v jq >/dev/null 2>&1; then
            if jq -e --arg p "$STATE_PATH" '[ (.commits[]?, (.head_commit // empty)) | (.added[]?, .modified[]?, .removed[]?) ] | index($p)' "$GITHUB_EVENT_PATH" >/dev/null; then
              changed_state=true
            fi
          elif [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            if git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | grep -Fxq -- "$STATE_PATH"; then
              changed_state=true
            fi
          fi

          if [[ "$changed_state" == "true" ]]; then
            echo "This push already changed $STATE_PATH (advance/reset/init); skipping to avoid a double advance."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 4) Machinery guard: a push that changes ONLY workshop machinery /
          #    platform files (.github/, .workshop/, Makefile, …) and never the
          #    participant's delivery (travel_assistant/ and its _root overlay
          #    siblings such as travel_toolbox/) is not step progress. This
          #    catches a participant who pulls the latest machinery from upstream
          #    and pushes it MANUALLY — i.e. without the [skip-advance] sentinel
          #    that the sync tooling adds. Advancing then would skip them past a
          #    step they never worked on. The machinery list lives in
          #    advance_step.py (single source of truth), so pipe the push's
          #    changed paths to `--check-machinery-only` rather than duplicating
          #    it here. Use `git diff` over the whole pushed range (BEFORE..SHA):
          #    the checkout is full-depth and guard #1 already fetched the ref, so
          #    for a normal machinery pull (a fast-forward, BEFORE reachable) this
          #    sees every changed path with no cap. Deliberately do NOT fall back
          #    to the event payload when BEFORE is unreachable (a force-push): that
          #    payload caps .commits[] at 20 entries and could omit a delivery
          #    path, which would wrongly suppress a real advance. Treat an
          #    undeterminable set as "unknown" and let the push advance (legacy
          #    behavior) — better to advance than to strand a participant.
          #    python3 is preinstalled on the runner and the script is stdlib-only,
          #    so this runs before the Setup Python step.
          changed=""
          if [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            changed="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
          fi
          if [[ -n "${changed//[[:space:]]/}" ]]; then
            # Capture in its own variable so a nonzero exit from the classifier
            # trips `set -e` (fail closed: don't silently advance) instead of the
            # comparison quietly evaluating false inside `[[ "$(...)" ]]`.
            machinery_only="$(printf '%s\n' "$changed" | python3 .workshop/scripts/advance_step.py --check-machinery-only)"
            if [[ "$machinery_only" == "true" ]]; then
              echo "This push changed only workshop machinery/platform files (no delivery); not advancing."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: pip install -r .workshop/scripts/requirements.txt

      - name: Advance workshop step
        id: advance
        if: steps.guard.outputs.proceed == 'true'
        # No-op (advanced=false) before init, at Setup (step 0), and at the final
        # step; advances exactly one step otherwise. Fails loudly only when state
        # is missing/corrupt after initialization.
        run: python .workshop/scripts/advance_step.py --on-push

      - name: Commit & push
        if: steps.advance.outputs.advanced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "workshop: advance to step ${NEW_STEP}"
          git push

      - name: Summarize advancement
        if: steps.advance.outputs.advanced == 'true'
        run: |
          echo "## ✅ Advanced to step ${NEW_STEP}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Your push completed the previous step, so the workshop loaded the next one." >> "$GITHUB_STEP_SUMMARY"
          echo "Run \`git pull\` to refresh your README and the new step's files." >> "$GITHUB_STEP_SUMMARY"
