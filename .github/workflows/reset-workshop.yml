name: Reset workshop

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RESET to confirm. This will overwrite travel_assistant/ — backups go to .workshop_instance/workshop_backups/reset-<timestamp>/."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  # Shared with init-workshop.yml, start-workshop.yml and advance-on-push.yml so
  # every workflow that mutates the workshop state serializes on the same branch
  # and never races another on `git push` or `.workshop_instance/.workshop-state.json`.
  group: workshop-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reset:
    if: ${{ github.event.inputs.confirm == 'RESET' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r .workshop/scripts/requirements.txt

      - name: Reset workshop
        run: python .workshop/scripts/advance_step.py --reset

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "workshop: reset to step 0"
          git push

      - name: Summarize reset
        shell: bash
        run: |
          echo "## ✅ Workshop reset to step 0" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The previous travel_assistant/ is preserved under .workshop_instance/workshop_backups/reset-<timestamp>/." >> "$GITHUB_STEP_SUMMARY"

  confirm-required:
    if: ${{ github.event.inputs.confirm != 'RESET' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize missing confirmation
        shell: bash
        run: |
          echo "## ⚠️ Reset not confirmed. Re-run and type RESET in the confirm field." >> "$GITHUB_STEP_SUMMARY"
